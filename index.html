<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Editor</title>
  <style>
    :root {
      --canvas-cream: #e8e4d9;
      --ink-black: #121212;
      --dark-bg: #1a1a1a;
      --glass-smoke: rgba(45, 45, 45, 0.7);
      --accent: #e94560;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--dark-bg);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 120px 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: var(--canvas-cream);
      letter-spacing: 4px;
      font-weight: 300;
    }

    #upload-area {
      width: 100%;
      max-width: 700px;
      min-height: 300px;
      border: 2px dashed var(--ink-black);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--canvas-cream);
      color: var(--ink-black);
      transition: 0.3s;
      margin-bottom: 20px;
    }

    #upload-area:hover { opacity: 0.85; }

    #upload-area p { font-size: 1rem; color: var(--ink-black); }

    #canvas {
      max-width: 100%;
      border-radius: 12px;
      display: none;
    }

    .slider-panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 15px 20px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 15px;
      display: none;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .slider-row label {
      width: 100px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }

    .slider-row span {
      width: 45px;
      font-size: 13px;
      color: var(--canvas-cream);
      text-align: right;
    }

    .text-panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 15px 20px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 15px;
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .text-panel input[type="text"] {
      flex: 1;
      min-width: 150px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
    }

    .text-panel select {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
    }

    .text-panel input[type="color"] {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: none;
    }

    .panel-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--canvas-cream);
      color: var(--ink-black);
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: 0.3s;
    }

    .panel-btn:hover { opacity: 0.8; }

    #ai-result {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 15px 20px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 15px;
      display: none;
      line-height: 1.7;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }

    .filter-row {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 700px;
      margin-bottom: 15px;
    }

    .filter-chip {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: var(--canvas-cream);
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }

    .filter-chip:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--canvas-cream);
    }

    /* ALT TOOLBAR */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--glass-smoke);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 20px 0;
      z-index: 100;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 11px;
      transition: 0.3s;
      padding: 6px 12px;
      border-radius: 10px;
    }

    .tool-btn:hover, .tool-btn.active {
      color: var(--canvas-cream);
      background: rgba(255,255,255,0.06);
    }

    .tool-btn .icon { font-size: 20px; }
  </style>
</head>
<body>

  <h1>PHOTO EDITOR</h1>

  <div id="upload-area" onclick="document.getElementById('file-input').click()">
    <p>📷 Fotoğraf yüklemek için tıkla</p>
  </div>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <canvas id="canvas"></canvas>

  <div class="filter-row" id="filter-row">
    <button class="filter-chip" onclick="applyFilter('grayscale')">Siyah-Beyaz</button>
    <button class="filter-chip" onclick="applyFilter('sepia')">Sepya</button>
    <button class="filter-chip" onclick="applyFilter('invert')">Negatif</button>
    <button class="filter-chip" onclick="resetFilter()">Sıfırla</button>
  </div>

  <div class="slider-panel" id="slider-panel">
    <div class="slider-row">
      <label>Parlaklık</label>
      <input type="range" id="brightness" min="0" max="200" value="100" oninput="applySliders()">
      <span id="brightness-val">100%</span>
    </div>
    <div class="slider-row">
      <label>Kontrast</label>
      <input type="range" id="contrast" min="0" max="200" value="100" oninput="applySliders()">
      <span id="contrast-val">100%</span>
    </div>
  </div>

  <div class="text-panel" id="text-panel">
    <input type="text" id="text-input" placeholder="Metin yaz...">
    <select id="font-size">
      <option value="20">Küçük</option>
      <option value="36" selected>Orta</option>
      <option value="56">Büyük</option>
    </select>
    <input type="color" id="text-color" value="#ffffff">
    <button class="panel-btn" onclick="addText()">Ekle</button>
  </div>

  <div id="ai-result"></div>

  <div class="toolbar">
    <button class="tool-btn" onclick="document.getElementById('file-input').click()">
      <span class="icon">📁</span> Yükle
    </button>
    <button class="tool-btn" id="btn-filter" onclick="togglePanel('filter')">
      <span class="icon">🎨</span> Filtre
    </button>
    <button class="tool-btn" id="btn-adjust" onclick="togglePanel('adjust')">
      <span class="icon">🎚️</span> Ayar
    </button>
    <button class="tool-btn" id="btn-text" onclick="togglePanel('text')">
      <span class="icon">✏️</span> Metin
    </button>
    <button class="tool-btn" onclick="downloadImage()">
      <span class="icon">💾</span> İndir
    </button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('file-input');
    const uploadArea = document.getElementById('upload-area');

    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          canvas.style.display = 'block';
          uploadArea.style.display = 'none';
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    function togglePanel(panel) {
      const filterRow = document.getElementById('filter-row');
      const sliderPanel = document.getElementById('slider-panel');
      const textPanel = document.getElementById('text-panel');

      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));

      if (panel === 'filter') {
        sliderPanel.style.display = 'none';
        textPanel.style.display = 'none';
        filterRow.style.display = filterRow.style.display === 'flex' ? 'none' : 'flex';
        document.getElementById('btn-filter').classList.toggle('active');
      } else if (panel === 'adjust') {
        filterRow.style.display = 'none';
        textPanel.style.display = 'none';
        sliderPanel.style.display = sliderPanel.style.display === 'block' ? 'none' : 'block';
        document.getElementById('btn-adjust').classList.toggle('active');
      } else if (panel === 'text') {
        filterRow.style.display = 'none';
        sliderPanel.style.display = 'none';
        textPanel.style.display = textPanel.style.display === 'flex' ? 'none' : 'flex';
        document.getElementById('btn-text').classList.toggle('active');
      }
    }

    function applyFilter(filter) {
      if (filter === 'grayscale') canvas.style.filter = 'grayscale(100%)';
      if (filter === 'sepia') canvas.style.filter = 'sepia(100%)';
      if (filter === 'invert') canvas.style.filter = 'invert(100%)';
    }

    function resetFilter() {
      canvas.style.filter = 'none';
      document.getElementById('brightness').value = 100;
      document.getElementById('contrast').value = 100;
      document.getElementById('brightness-val').textContent = '100%';
      document.getElementById('contrast-val').textContent = '100%';
    }

    function applySliders() {
      const brightness = document.getElementById('brightness').value;
      const contrast = document.getElementById('contrast').value;
      document.getElementById('brightness-val').textContent = brightness + '%';
      document.getElementById('contrast-val').textContent = contrast + '%';
      canvas.style.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
    }

    function downloadImage() {
      if (!canvas.width) { alert('Önce bir fotoğraf yükle!'); return; }
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCtx.filter = canvas.style.filter;
      tempCtx.drawImage(canvas, 0, 0);
      const link = document.createElement('a');
      link.download = 'edited-photo.png';
      link.href = tempCanvas.toDataURL();
      link.click();
    }

    let pendingText = null;

    canvas.addEventListener('click', function(e) {
      if (!pendingText) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const fontSize = document.getElementById('font-size').value;
      const color = document.getElementById('text-color').value;
      ctx.font = `${fontSize}px Arial`;
      ctx.fillStyle = color;
      ctx.fillText(pendingText, x, y);
      pendingText = null;
      canvas.style.cursor = 'default';
    });

    function addText() {
      const text = document.getElementById('text-input').value;
      if (!text) { alert('Önce bir metin yaz!'); return; }
      pendingText = text;
      canvas.style.cursor = 'crosshair';
      alert('Fotoğrafın üzerine tıkla!');
    }
  </script>

</body>
</html>
