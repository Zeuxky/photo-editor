<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Photo Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #1a1a2e;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }
    h1 { margin-bottom: 20px; color: #e94560; }
    #upload-btn, #download-btn {
      background-color: #e94560;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 10px;
    }
    #download-btn { background-color: #0f3460; border: 2px solid #e94560; }
    #download-btn:hover, #upload-btn:hover { opacity: 0.8; }
    .filters {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .filter-btn {
      background-color: #16213e;
      color: white;
      padding: 8px 16px;
      border: 2px solid #e94560;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }
    .filter-btn:hover { background-color: #e94560; }
    .slider-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    input[type="range"] { width: 200px; accent-color: #e94560; }
    .text-tools {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .text-tools input[type="text"] {
      padding: 8px 12px;
      border-radius: 6px;
      border: 2px solid #e94560;
      background-color: #16213e;
      color: white;
      font-size: 14px;
      width: 200px;
    }
    .text-tools input[type="color"] {
      border: none;
      background: none;
      cursor: pointer;
      width: 40px;
      height: 36px;
    }
    .text-tools select {
      padding: 8px;
      border-radius: 6px;
      border: 2px solid #e94560;
      background-color: #16213e;
      color: white;
      font-size: 14px;
    }
    .ai-tools {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      justify-content: center;
    }
    #ai-result {
      background-color: #16213e;
      border: 2px solid #e94560;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0;
      max-width: 600px;
      width: 100%;
      display: none;
      line-height: 1.6;
    }
    #canvas { border: 2px solid #e94560; border-radius: 8px; max-width: 100%; }
  </style>
</head>
<body>

  <h1>Photo Editor</h1>
  <button id="upload-btn" onclick="document.getElementById('file-input').click()">Fotoğraf Yükle</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <button id="download-btn" onclick="downloadImage()">📥 Fotoğrafı İndir</button>

  <div class="filters">
    <button class="filter-btn" onclick="applyFilter('grayscale')">Siyah-Beyaz</button>
    <button class="filter-btn" onclick="applyFilter('sepia')">Sepya</button>
    <button class="filter-btn" onclick="applyFilter('invert')">Negatif</button>
    <button class="filter-btn" onclick="resetFilter()">Sıfırla</button>
  </div>

  <div class="slider-container">
    <label>Parlaklık: <span id="brightness-val">100</span>%</label>
    <input type="range" id="brightness" min="0" max="200" value="100" oninput="applySliders()">
    <label>Kontrast: <span id="contrast-val">100</span>%</label>
    <input type="range" id="contrast" min="0" max="200" value="100" oninput="applySliders()">
  </div>

  <div class="text-tools">
    <input type="text" id="text-input" placeholder="Metin yaz...">
    <select id="font-size">
      <option value="20">Küçük</option>
      <option value="36" selected>Orta</option>
      <option value="56">Büyük</option>
    </select>
    <input type="color" id="text-color" value="#ffffff" title="Renk seç">
    <button class="filter-btn" onclick="addText()">Metin Ekle</button>
  </div>

  <div class="ai-tools">
    <button class="filter-btn" onclick="analyzePhoto()">🤖 AI ile Analiz Et</button>
  </div>
  <div id="ai-result"></div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('file-input');

    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    function applyFilter(filter) {
      if (filter === 'grayscale') canvas.style.filter = 'grayscale(100%)';
      if (filter === 'sepia') canvas.style.filter = 'sepia(100%)';
      if (filter === 'invert') canvas.style.filter = 'invert(100%)';
    }

    function resetFilter() {
      canvas.style.filter = 'none';
      document.getElementById('brightness').value = 100;
      document.getElementById('contrast').value = 100;
      document.getElementById('brightness-val').textContent = 100;
      document.getElementById('contrast-val').textContent = 100;
    }

    function applySliders() {
      const brightness = document.getElementById('brightness').value;
      const contrast = document.getElementById('contrast').value;
      document.getElementById('brightness-val').textContent = brightness;
      document.getElementById('contrast-val').textContent = contrast;
      canvas.style.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
    }

    function downloadImage() {
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCtx.filter = canvas.style.filter;
      tempCtx.drawImage(canvas, 0, 0);
      const link = document.createElement('a');
      link.download = 'edited-photo.png';
      link.href = tempCanvas.toDataURL();
      link.click();
    }

    let pendingText = null;

    canvas.addEventListener('click', function(e) {
      if (!pendingText) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const fontSize = document.getElementById('font-size').value;
      const color = document.getElementById('text-color').value;
      ctx.font = `${fontSize}px Arial`;
      ctx.fillStyle = color;
      ctx.fillText(pendingText, x, y);
      pendingText = null;
      canvas.style.cursor = 'default';
    });

    function addText() {
      const text = document.getElementById('text-input').value;
      if (!text) { alert('Önce bir metin yaz!'); return; }
      pendingText = text;
      canvas.style.cursor = 'crosshair';
      alert('Şimdi fotoğrafın üzerine tıkla!');
    }
    function getApiKey() {
  let key = sessionStorage.getItem('anthropic_key');
  if (!key) {
    key = prompt('Anthropic API Key\'ini gir:');
    if (key) sessionStorage.setItem('anthropic_key', key);
  }
  return key;
}

    async function analyzePhoto() {
      if (!canvas.width) { alert('Önce bir fotoğraf yükle!'); return; }
      const aiResult = document.getElementById('ai-result');
      aiResult.style.display = 'block';
      aiResult.textContent = '🤖 Analiz ediliyor...';
      const imageData = canvas.toDataURL('image/jpeg').split(',')[1];
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': getApiKey(),
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageData } },
                { type: 'text', text: 'Bu fotoğrafı Türkçe olarak analiz et. Ne görüyorsun, renkler nasıl, genel atmosfer nedir?' }
              ]
            }]
          })
        });
        const data = await response.json();
        aiResult.textContent = data.content[0].text;
      } catch (error) {
        aiResult.textContent = 'Hata oluştu: ' + error.message;
      }
    }
  </script>

</body>
</html>
