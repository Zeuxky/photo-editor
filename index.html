<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Lab | Studio Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&family=Playfair+Display:ital,wght@1,400&family=Outfit:wght@100;400;800&family=Space+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root { --bg: #050505; --panel: #0d0d0d; --accent: #e8e4d9; --border: rgba(255,255,255,0.05); --gold: #c5a059; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--accent); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid var(--border); }
    .logo { font-size: 11px; letter-spacing: 6px; text-transform: uppercase; font-weight: 300; }
    
    /* Dil Değiştirici Stil */
    .lang-switcher { font-size: 9px; letter-spacing: 2px; cursor: pointer; opacity: 0.5; transition: 0.3s; margin-right: 20px; text-transform: uppercase; }
    .lang-switcher:hover { opacity: 1; color: var(--gold); }

    #main { flex: 1; display: flex; overflow: hidden; }
    #stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 40px; background: #000; }
    canvas { max-width: 100%; max-height: 100%; box-shadow: 0 40px 100px rgba(0,0,0,0.9); }

    #sidebar { width: 350px; background: var(--panel); border-left: 1px solid var(--border); padding: 30px; overflow-y: auto; }
    .sec-title { font-size: 9px; text-transform: uppercase; color: #666; margin: 25px 0 12px; letter-spacing: 2px; }
    
    input, select { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; font-size: 11px; margin-bottom: 12px; outline: none; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .opt-btn { background: transparent; border: 1px solid var(--border); color: #666; padding: 12px; font-size: 9px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    .opt-btn.active { border-color: #fff; color: #fff; }
    .export-btn { background: var(--accent); color: #000; border: none; padding: 10px 25px; font-size: 10px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <div class="logo">Neural Lab <span style="font-weight:100; opacity:0.5;">Studio Pro</span></div>
  <div style="display:flex; align-items:center;">
    <span class="lang-switcher" onclick="toggleLang()" id="lang-btn">EN</span>
    <button class="export-btn" id="btn-render" onclick="startExport()">RENDER</button>
  </div>
</header>

<div id="main">
  <div id="stage">
    <div id="ui-init">
        <button class="opt-btn" id="btn-import" onclick="document.getElementById('file-in').click()" style="padding:20px 40px;">IMPORT SOURCE</button>
    </div>
    <canvas id="c"></canvas>
  </div>

  <aside id="sidebar">
    <div class="sec-title" id="title-typo">Typography</div>
    <input type="text" id="txt-val" placeholder="..." oninput="draw()">
    
    <div class="sec-title" id="title-fx">Cinematic Textures</div>
    <div class="btn-grid">
        <button class="opt-btn active" data-key="clean" onclick="setFX('none', this)">Clean</button>
        <button class="opt-btn" data-key="bloom" onclick="setFX('bloom', this)">Soft Bloom</button>
        <button class="opt-btn" data-key="grain" onclick="setFX('grain', this)">35mm Grain</button>
        <button class="opt-btn" data-key="letterbox" onclick="setFX('letterbox', this)">Letterbox</button>
    </div>

    <div class="sec-title" id="title-color">Color Grading</div>
    <div class="btn-grid">
        <button class="opt-btn" data-key="muted" onclick="setGrade('muted', this)">Muted</button>
        <button class="opt-btn" data-key="deep" onclick="setGrade('deep', this)">Deep OLED</button>
    </div>
  </aside>
</div>

<input type="file" id="file-in" style="display:none" accept="video/*,image/*">
<video id="v-hidden" loop style="display:none"></video>

<script>
  let currentLang = 'TR';
  const translations = {
    TR: {
      render: "DIŞA AKTAR",
      import: "DOSYA YÜKLE",
      typo: "TİPOGRAFİ",
      fx: "SİNEMATİK DOKULAR",
      color: "RENK AYARI",
      clean: "TEMİZ",
      bloom: "YUMUŞAK IŞIK",
      grain: "FİLM GRENİ",
      letterbox: "SİNEMASKOP",
      muted: "SOLGUN",
      deep: "DERİN SİYAH",
      placeholder: "Yazı ekle..."
    },
    EN: {
      render: "EXPORT",
      import: "IMPORT SOURCE",
      typo: "TYPOGRAPHY",
      fx: "CINEMATIC TEXTURES",
      color: "COLOR GRADING",
      clean: "CLEAN",
      bloom: "SOFT BLOOM",
      grain: "35MM GRAIN",
      letterbox: "LETTERBOX",
      muted: "MUTED",
      deep: "DEEP OLED",
      placeholder: "Add text..."
    }
  };

  function toggleLang() {
    currentLang = currentLang === 'TR' ? 'EN' : 'TR';
    document.getElementById('lang-btn').innerText = currentLang === 'TR' ? 'EN' : 'TR';
    updateLanguage();
  }

  function updateLanguage() {
    const t = translations[currentLang];
    document.getElementById('btn-render').innerText = t.render;
    document.getElementById('btn-import').innerText = t.import;
    document.getElementById('title-typo').innerText = t.typo;
    document.getElementById('title-fx').innerText = t.fx;
    document.getElementById('title-color').innerText = t.color;
    document.getElementById('txt-val').placeholder = t.placeholder;
    
    // Buton metinlerini güncelle
    document.querySelectorAll('.opt-btn[data-key]').forEach(btn => {
      btn.innerText = t[btn.getAttribute('data-key')];
    });
  }

  // --- Buradan aşağısı önceki render kodlarının aynısıdır ---
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const video = document.getElementById('v-hidden');
  let currentFX = 'none', currentGrade = 'none';

  document.getElementById('file-in').onchange = (e) => {
    const file = e.target.files[0];
    video.src = URL.createObjectURL(file);
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        document.getElementById('ui-init').style.display = 'none';
        video.play();
        render();
    };
  };

  function setFX(fx, btn) {
    currentFX = fx;
    btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function setGrade(gr, btn) {
    currentGrade = gr;
    btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function render() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(currentGrade === 'deep') ctx.filter = 'contrast(1.2) brightness(0.8)';
    else if(currentGrade === 'muted') ctx.filter = 'saturate(0.5)';
    else ctx.filter = 'none';
    
    ctx.drawImage(video, 0, 0);

    if(currentFX === 'grain') {
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        for(let i=0; i<500; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
    }
    
    const txt = document.getElementById('txt-val').value;
    if(txt) {
        ctx.font = `300 ${canvas.width/20}px 'Inter'`;
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.fillText(txt.toUpperCase(), canvas.width/2, canvas.height * 0.9);
    }
    requestAnimationFrame(render);
  }
</script>
</body>
</html>
